<style>
  :root{
    --void: #04060a;
    --panel: #070b12;
    --grid: #0d1722;
    --green: #00ff9f;
    --green-dim: #0a4a39;
    --amber: #ffb800;
    --red: #ff1f4b;
    --cyan: #00d4ff;
    --purple: #b026ff;
    --text-dim: #4c6b73;
  }
  html,body{ background:var(--void); margin:0; height:100%; }
  *{ box-sizing:border-box; }
  body{ font-family:'JetBrains Mono', 'SF Mono', 'Roboto Mono', 'Courier New', monospace; }

  ::-webkit-scrollbar{ width:4px; height:4px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--green-dim); border-radius:2px; }

  @keyframes scanlines {
    0% { background-position: 0 0; }
    100% { background-position: 0 4px; }
  }
  .scanline-overlay{
    pointer-events:none;
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,159,0.035) 0px,
      rgba(0,255,159,0.035) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    animation: scanlines 0.2s linear infinite;
    z-index:40;
  }
  .vignette{
    pointer-events:none; position:absolute; inset:0; z-index:39;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
  }

  @keyframes modal-pop {
    0%{ opacity:0; transform: scale(0.92) translateY(8px); }
    100%{ opacity:1; transform: scale(1) translateY(0); }
  }
  .ad-modal-pop{ animation: modal-pop 0.22s cubic-bezier(0.16,1,0.3,1); }

  @keyframes flicker {
    0%,100%{ opacity:1; }
    92%{ opacity:1; }
    93%{ opacity:0.4; }
    94%{ opacity:1; }
    96%{ opacity:0.6; }
    97%{ opacity:1; }
  }
  .crt-flicker{ animation: flicker 6s infinite; }

  @keyframes glitch-1 {
    0%,100%{ clip-path: inset(0 0 0 0); transform:translate(0,0); }
    20%{ clip-path: inset(20% 0 60% 0); transform:translate(-2px,0); }
    40%{ clip-path: inset(60% 0 10% 0); transform:translate(2px,0); }
    60%{ clip-path: inset(10% 0 70% 0); transform:translate(-1px,0); }
    80%{ clip-path: inset(80% 0 5% 0); transform:translate(1px,0); }
  }
  @keyframes glitch-2 {
    0%,100%{ clip-path: inset(0 0 0 0); transform:translate(0,0); }
    20%{ clip-path: inset(70% 0 5% 0); transform:translate(2px,0); }
    40%{ clip-path: inset(5% 0 80% 0); transform:translate(-2px,0); }
    60%{ clip-path: inset(40% 0 30% 0); transform:translate(1px,0); }
    80%{ clip-path: inset(15% 0 60% 0); transform:translate(-1px,0); }
  }
  .glitch-wrap{ position:relative; display:inline-block; }
  .glitch-wrap .glitch-layer{
    position:absolute; top:0; left:0; width:100%; height:100%;
  }
  .glitch-layer.c1{ color:var(--cyan); animation: glitch-1 2.6s infinite linear; opacity:0.7; }
  .glitch-layer.c2{ color:var(--red); animation: glitch-2 3.1s infinite linear; opacity:0.7; }

  @keyframes pulse-glow {
    0%,100%{ filter: drop-shadow(0 0 5px currentColor); }

  .pulse-glow{ animation: pulse-glow 1.4s ease-in-out infinite; }

  @keyframes blink-red {
    0%,100%{ opacity:1; }
    50%{ opacity:0.25; }
  }
  .blink-red{ animation: blink-red 0.45s steps(2,start) infinite; }

  @keyframes border-flash {
    0%,100%{ box-shadow: inset 0 0 0px rgba(255,31,75,0); border-color: rgba(255,31,75,0.3); }

  .flash-red{ animation: border-flash 0.15s ease-out 2; }

  .clip-corner{
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .clip-corner-sm{
    clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px));
  }

  .hud-panel{
    background: linear-gradient(180deg, rgba(7,11,18,0.96) 0%, rgba(4,6,10,0.98) 100%);
    border: 1px solid rgba(0,255,159,0.18);
    position: relative;
  }
  .hud-panel::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity:0.6;

  .data-row{
    display:flex; justify-content:space-between; align-items:baseline;
    border-bottom: 1px dashed rgba(76,107,115,0.25);

  .terminal-cursor::after{

    animation: blink-cursor 1s step-end infinite;

    display: block;
    width: 100%;
  }

  .stat-tick{ font-variant-numeric: tabular-nums; }

  .hidden{ display:none !important; }

<div id="root" class="w-full max-w-sm mx-auto px-2 overflow-x-hidden min-h-screen flex flex-col justify-between box-border relative bg-[var(--void)] font-mono select-none"></div>

<script>
/* ============================== SOUND ENGINE ============================== */
class SoundEngine {
  constructor(){
    this.ctx = null;
    this.master = null;
    this.muted = false;
  }
  ensure(){
    if(!this.ctx){
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
    }
    if(this.ctx.state === 'suspended') this.ctx.resume();
  }
  setMuted(m){ this.muted = m; if(this.master) this.master.gain.value = m ? 0 : 0.5; }

  click(){
    this.ensure(); if(this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1800 + Math.random()*400, t);
    osc.frequency.exponentialRampToValueAtTime(600, t+0.03);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.04);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t+0.05);
  }
  error(){
    this.ensure(); if(this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.linearRampToValueAtTime(80, t+0.15);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t+0.2);
  }
  destroy(){
    this.ensure(); if(this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(40, t+0.35);
    gain.gain.setValueAtTime(0.22, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t+0.4);
    const bufferSize = this.ctx.sampleRate * 0.15;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const nf = this.ctx.createBiquadFilter();
    nf.type='lowpass'; nf.frequency.value = 2200;
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(0.18, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t+0.15);
    noise.connect(nf); nf.connect(ng); ng.connect(this.master);
    noise.start(t);
  }
  alarm(){
    this.ensure(); if(this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(740, t);
    osc.frequency.linearRampToValueAtTime(940, t+0.12);
    osc.frequency.linearRampToValueAtTime(740, t+0.24);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.linearRampToValueAtTime(0.001, t+0.26);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t+0.27);
  }
  overdrive(){
    this.ensure(); if(this.muted) return;
    const t = this.ctx.currentTime;
    [0,0.08,0.16].forEach((d,i)=>{
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(220 * (i+1), t+d);
      gain.gain.setValueAtTime(0.1, t+d);
      gain.gain.exponentialRampToValueAtTime(0.001, t+d+0.2);
      osc.connect(gain); gain.connect(this.master);
      osc.start(t+d); osc.stop(t+d+0.22);
    });
  }
  hit(){
    this.ensure(); if(this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(50, t+0.3);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t+0.35);
  }
}

/* ============================== WORD BANK ============================== */
const WORDS_SHORT = ["data","core","byte","node","sync","grid","void","exec","pulse","logic","alpha","ghost","spike","crash","fault","input","cache","pixel","trace","vault"];
const WORDS_MID = ["firewall","protocol","override","payload","kernel","cipher","matrix","render","circuit","upload","malware","gateway","binary","encrypt","virtual","sandbox","trojan","airgap","beacon","exploit"];
const WORDS_LONG = ["mainframe","decryption","algorithm","biohazard","quarantine","subroutine","singularity","corruption","backdoor","blacksite","apocalypse","neuralnet","prototype","catastrophe","annihilate","obfuscate","resurrect","fragmented","detonation","unstoppable"];

function pickWord(score){
  let pool;
  if(score < 300) pool = WORDS_SHORT;
  else if(score < 1200) pool = [...WORDS_SHORT, ...WORDS_MID];
  else if(score < 3000) pool = WORDS_MID;
  else pool = [...WORDS_MID, ...WORDS_LONG];
  return pool[Math.floor(Math.random()*pool.length)];
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  /* ---------- mutable game state ---------- */

    state.enemies.push({
      id: state.idCounter,
      word, x, y: -20,
      speed: baseSpeed,
      typedIdx: 0,
      hitFlash: 0,
    });

      const multiplier = 1 + Math.min(state.streak * 0.1, 2);

      const prevScore = state.score;
      state.score += gained;
      state.wordsCompleted += 1;
      state.overdriveMeter = Math.min(100, state.overdriveMeter + (state.overdriveActive ? 0 : 14));
      sound.destroy();
      spawnParticles(en.x, en.y, state.overdriveActive ? 22 : 14, wordLen>=8 ? 'red' : 'green');

        pushLog(`[SYSTEM]: ${state.streak}x MULTI-KILL BONUS!`, 'good');

        pushLog(`[SYSTEM]: HEAVY TARGET NEUTRALIZED — "${en.word.toUpperCase()}"`, 'good');

      if(Math.floor(prevScore/500) !== Math.floor(state.score/500)){
        state.wave += 1;
        pushLog(`[SYSTEM]: WAVE ${state.wave} INCOMING`, 'wave');

        triggerShake(14);

      return;
    }
    if(e.key.length !== 1) return;
    if(!/^[a-zA-Z]$/.test(e.key)) return;

    e.preventDefault();
    sound.ensure();
    const key = e.key.toLowerCase();
    state.totalKeys += 1;

    let locked = state.lockedId != null ? state.enemies.find(en => en.id === state.lockedId) : null;

    if(locked){
      const expected = locked.word[locked.typedIdx];
      if(key === expected){
        locked.typedIdx += 1;
        state.correctKeys += 1;
        state.typed = locked.word.slice(0, locked.typedIdx);
        sound.click();
        if(state.overdriveActive){
          spawnParticles(locked.x, locked.y, 5, 'purple');
        }
        if(locked.typedIdx >= locked.word.length){
          destroyEnemy(locked.id, true);
        }
      } else {
        sound.error();
        state.streak = 0;
        state.inputFlash = 10;
        triggerShake(4);
        pushLog(`[WARNING]: Input desync on "${locked.word.toUpperCase()}"`, 'warn');
      }
    } else {
      const candidates = state.enemies.filter(en => en.word[0] === key).sort((a,b)=>b.y-a.y);
      if(candidates.length > 0){
        const target = candidates[0];
        state.lockedId = target.id;
        target.typedIdx = 1;
        state.typed = target.word.slice(0,1);
        state.correctKeys += 1;
        sound.click();
        if(target.typedIdx >= target.word.length){
          destroyEnemy(target.id, true);
        }
      } else {
        sound.error();
        state.inputFlash = 10;
      }
    }
  }

  /* ---------- lives display ---------- */

  function syncHud(){
    const wpmEl = document.getElementById('stat-wpm');
    if(!wpmEl) return; // screen changed

    document.getElementById('overdrive-banner').classList.toggle('hidden', !state.overdriveActive);

    const typedEl = document.getElementById('typed-display');
    const remEl = document.getElementById('remainder-display');
    const lockedBadge = document.getElementById('locked-badge');
    const lockedEn = state.lockedId != null ? state.enemies.find(e=>e.id===state.lockedId) : null;

      typedEl.textContent = state.typed;
      remEl.textContent = lockedEn ? lockedEn.word.slice(state.typed.length) : '';
      lockedBadge.classList.toggle('hidden', !lockedEn);
    }

    if(inputBar){
      if(state.inputFlash > 0){
        inputBar.classList.add('flash-red');
        inputBar.classList.add('bg-[var(--red)]/10');

        inputBar.classList.remove('flash-red');
        inputBar.classList.remove('bg-[var(--red)]/10');
      }
    }
  }

  /* ---------- canvas render ---------- */
  function resize(){
    const rect = containerEl.getBoundingClientRect();
    state.dims = { w: rect.width, h: rect.height };
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width = rect.width+'px';
    canvas.style.height = rect.height+'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  function colorFor(name){
    switch(name){
      case 'red': return '#ff1f4b';
      case 'green': return '#00ff9f';
      case 'purple': return '#b026ff';
      default: return '#00ff9f';
    }
  }

  function renderCanvas(){
    const { w, h } = state.dims;
    ctx.save();
    ctx.translate(state.shake.x, state.shake.y);

    const overdrive = state.overdriveActive;
    const bgGrad = ctx.createLinearGradient(0,0,0,h);
    if(overdrive){
      bgGrad.addColorStop(0, '#1a0033');
      bgGrad.addColorStop(1, '#04060a');
    } else {
      bgGrad.addColorStop(0, '#070b12');
      bgGrad.addColorStop(1, '#04060a');
    }
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-20,-20,w+40,h+40);

    ctx.strokeStyle = overdrive ? 'rgba(176,38,255,0.18)' : 'rgba(0,255,159,0.07)';
    ctx.lineWidth = 1;
    const gridSize = 26;
    for(let x=0;x<w;x+=gridSize){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y=0;y<h;y+=gridSize){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

    const critY = h*0.76;
    const critGrad = ctx.createLinearGradient(0,critY,0,h);
    critGrad.addColorStop(0, 'rgba(255,31,75,0)');
    critGrad.addColorStop(1, 'rgba(255,31,75,0.22)');
    ctx.fillStyle = critGrad;
    ctx.fillRect(0,critY,w,h-critY);
    ctx.strokeStyle = 'rgba(255,31,75,0.5)';
    ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(0,critY); ctx.lineTo(w,critY); ctx.stroke();
    ctx.setLineDash([]);

    const lockedId = state.lockedId;
    state.enemies.forEach(en=>{
      const depthRatio = en.y / h;
      let color, glow;
      if(depthRatio < 0.4){ color = '#00ff9f'; glow = 'rgba(0,255,159,0.5)'; }
      else if(depthRatio < 0.72){ color = '#ffb800'; glow = 'rgba(255,184,0,0.55)'; }
      else { color = '#ff1f4b'; glow = 'rgba(255,31,75,0.8)'; }

      const isLocked = en.id === lockedId;
      const flashing = depthRatio >= 0.72;
      const flashAlpha = flashing ? (0.6 + 0.4*Math.sin(performance.now()/80)) : 1;

      ctx.font = `bold ${overdrive ? 13:12}px 'JetBrains Mono', monospace`;
      const textW = ctx.measureText(en.word).width;
      const padX = 9;
      const boxW = textW + padX*2;
      const boxH = 22;
      const bx = en.x - boxW/2, by = en.y - boxH/2;

      ctx.save();
      ctx.globalAlpha = flashAlpha;

      ctx.fillStyle = 'rgba(4,6,10,0.82)';
      ctx.fillRect(bx,by,boxW,boxH);

      ctx.shadowColor = glow;
      ctx.shadowBlur = isLocked ? 16 : 7;
      ctx.strokeStyle = isLocked ? '#00d4ff' : color;
      ctx.lineWidth = isLocked ? 2 : 1.2;
      ctx.strokeRect(bx,by,boxW,boxH);
      ctx.shadowBlur = 0;

      const tick = 4;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      [[bx,by,1,1],[bx+boxW,by,-1,1],[bx,by+boxH,1,-1],[bx+boxW,by+boxH,-1,-1]].forEach(([cx,cy,dx,dy])=>{
        ctx.beginPath();
        ctx.moveTo(cx, cy+tick*dy); ctx.lineTo(cx,cy); ctx.lineTo(cx+tick*dx,cy);
        ctx.stroke();
      });

      const typedPart = en.word.slice(0, en.typedIdx);
      const restPart = en.word.slice(en.typedIdx);
      ctx.textBaseline = 'middle';
      let tx = bx + padX;
      const ty = by + boxH/2 + 1;
      if(typedPart){
        ctx.fillStyle = '#00d4ff';
        ctx.fillText(typedPart, tx, ty);
        tx += ctx.measureText(typedPart).width;
      }
      ctx.fillStyle = flashing ? '#fff' : '#cfe8e0';
      ctx.fillText(restPart, tx, ty);

      ctx.restore();
    });

    if(lockedId != null){
      const target = state.enemies.find(e=>e.id===lockedId);
      if(target){
        const originX = w/2, originY = h - 4;
        ctx.save();
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 1.5;
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 10;
        ctx.globalAlpha = 0.75 + 0.25*Math.sin(performance.now()/60);
        ctx.beginPath();
        ctx.moveTo(originX, originY);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(target.x, target.y, 3, 0, Math.PI*2);
        ctx.fillStyle = '#00d4ff';
        ctx.fill();
        ctx.restore();
      }
    }

    state.particles.forEach(p=>{
      ctx.save();
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = colorFor(p.color);
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    if(overdrive){
      ctx.save();
      ctx.globalAlpha = 0.12 + 0.08*Math.sin(performance.now()/100);
      const g = ctx.createRadialGradient(w/2,h/2,h*0.2,w/2,h/2,h*0.9);
      g.addColorStop(0,'rgba(176,38,255,0)');
      g.addColorStop(1,'rgba(176,38,255,0.5)');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
      ctx.restore();
    }

    ctx.restore();
  }

  /* ---------- main loop ---------- */
  let raf;
  let lastFrame = performance.now();
  let lastHudUpdate = 0;
  let alarmCooldown = 0;
  let active = true;

  function loop(now){
    if(!active) return;
    const dt = Math.min(48, now - lastFrame);
    lastFrame = now;
    const { w, h } = state.dims;

    if(state.overdriveActive){
      state.overdriveTime -= dt;
      if(state.overdriveTime <= 0){
        state.overdriveActive = false;
        pushLog('[SYSTEM]: Overdrive depleted.', 'sys');
      }
    }

    state.nextSpawn -= dt;
    if(state.nextSpawn <= 0){
      spawnEnemy();
      const interval = Math.max(550, SPAWN_BASE_INTERVAL - state.wave*70 - state.score*0.15);
      state.nextSpawn = interval;
    }

    const speedMul = state.overdriveActive ? 0.5 : 1;
    let nearCritical = false;
    for(let i=state.enemies.length-1; i>=0; i--){
      const en = state.enemies[i];
      en.y += en.speed * speedMul * (dt/1000);
      if(en.hitFlash > 0) en.hitFlash -= dt;
      const depthRatio = en.y / h;
      if(depthRatio > 0.72) nearCritical = true;
      if(en.y > h - 6){
        breachCore(en);
      }
    }
    if(nearCritical){
      alarmCooldown -= dt;
      if(alarmCooldown <= 0){ sound.alarm(); alarmCooldown = 1100; }
    }

    for(let i=state.particles.length-1;i>=0;i--){
      const p = state.particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.12;
      p.life -= 0.025;
      if(p.life <= 0) state.particles.splice(i,1);
    }

    if(state.inputFlash > 0) state.inputFlash -= 1;

    if(state.shake.t > 0){
      state.shake.t -= dt/180;
      if(state.shake.t < 0) state.shake.t = 0;
      const i = state.shake.intensity * state.shake.t;
      state.shake.x = (Math.random()*2-1) * i;
      state.shake.y = (Math.random()*2-1) * i;
    } else {
      state.shake.x = 0; state.shake.y = 0;
    }

    if(state.lives <= 0 && !state.gameOverFired){
      state.gameOverFired = true;

      const elapsedMin = Math.max(0.05, (Date.now()-state.startTime)/60000);
      const wpm = Math.round(state.wordsCompleted / elapsedMin);
      const accuracy = state.totalKeys > 0 ? Math.round((state.correctKeys/state.totalKeys)*100) : 100;

      window.removeEventListener('resize', resize);
      window.removeEventListener('keydown', handleKeyDown);
      App.finalStats = {
        score: state.score, wpm, accuracy,
        wave: state.wave, maxStreak: state.maxStreak,
        wordsCompleted: state.wordsCompleted
      };
      const newScores = [...App.highScores, { score: state.score, wpm, wave: state.wave, date: Date.now() }]
        .sort((a,b)=>b.score-a.score).slice(0,8);
      App.highScores = newScores;
      saveScores(newScores);
      App.screen = 'gameover';
      render();
      return;
    }

    renderCanvas();
    if(now - lastHudUpdate > 90){
      lastHudUpdate = now;
      syncHud();
    }

    raf = requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', handleKeyDown);
  raf = requestAnimationFrame(loop);
}

/* ============================== GAME OVER SCREEN ============================== */
function renderGameOver(){
  const stats = App.finalStats;
  if(!stats){ App.screen = 'title'; render(); return; }
  const rank = App.highScores.findIndex(s => s.score === stats.score && s.wave === stats.wave) + 1;

  root.innerHTML = `
    <div class="w-full min-h-screen title-grid-bg flex flex-col items-center justify-center relative py-6">
      <div class="scanline-overlay"></div>
      <div class="vignette"></div>
      <div class="absolute inset-0 bg-gradient-to-b from-[var(--red)]/5 via-transparent to-[var(--void)]"></div>

      <div class="hud-panel clip-corner p-4 w-full max-w-[340px] relative z-10">
        <div class="flex items-center gap-2 mb-1">
          <div class="w-1.5 h-1.5 bg-[var(--red)] blink-red" style="box-shadow:0 0 6px var(--red)"></div>
          <span class="text-[9px] text-[var(--red)] tracking-[0.25em]">CORE OFFLINE</span>
        </div>
        <h1 class="font-display font-black text-lg text-[var(--red)] tracking-tight mb-1" style="text-shadow:0 0 18px rgba(255,31,75,0.6)">
          SYSTEM FAILURE
        </h1>
        <p class="text-[var(--text-dim)] text-[9px] tracking-widest mb-4">// DIAGNOSTIC REPORT</p>

        <div class="grid grid-cols-2 gap-2 mb-4">
          ${diagStatHtml('SCORE', stats.score.toLocaleString(), 'var(--amber)', true)}
          ${diagStatHtml('WPM', stats.wpm, 'var(--green)')}
          ${diagStatHtml('ACCURACY', stats.accuracy + '%', 'var(--cyan)')}
          ${diagStatHtml('WAVES', stats.wave, 'var(--purple)')}
          ${diagStatHtml('MAX STREAK', stats.maxStreak, 'var(--green)')}
          ${diagStatHtml('WORDS', stats.wordsCompleted, 'var(--cyan)')}
        </div>

        ${rank > 0 && rank <= 8 ? `
          <div class="mb-4 px-3 py-2 border border-[var(--amber)] bg-[var(--amber)]/10 text-[var(--amber)] text-[10px] tracking-widest clip-corner-sm text-center">
            &#9733; NEW RECORD — RANK #${rank}
          </div>
        ` : ''}

        <div class="flex flex-col gap-2 w-full">
          <button id="btn-restart" class="btn-primary clip-corner w-full py-3 font-display font-bold tracking-widest text-sm pulse-glow">
            &#9656; RESTART RUN
          </button>
          <button id="btn-title" class="clip-corner-sm border border-[var(--text-dim)] text-[var(--text-dim)] active:text-white active:border-white px-4 py-3 text-[11px] tracking-widest transition-colors w-full">
            TITLE SCREEN
          </button>
        </div>
        <p class="text-center text-[9px] text-[var(--text-dim)] mt-3 tracking-widest">PRESS ENTER TO RESTART</p>
      </div>
    </div>
  `;

  function restart(){
    window.removeEventListener('keydown', enterHandler);
    App.screen = 'playing';
    render();
  }
  function enterHandler(e){
    if(e.key === 'Enter') restart();
  }

  document.getElementById('btn-restart').addEventListener('click', restart);
  document.getElementById('btn-title').addEventListener('click', ()=>{
    window.removeEventListener('keydown', enterHandler);
    App.screen = 'title';
    render();
  });
  window.addEventListener('keydown', enterHandler);
}

function diagStatHtml(label, value, color, big){
  return `
    <div class="border border-white/10 bg-black/30 p-2 clip-corner-sm">
      <div class="text-[8px] text-[var(--text-dim)] tracking-widest mb-0.5">${label}</div>
      <div class="font-display font-bold ${big ? 'text-xl':'text-base'}" style="color:${color}; text-shadow:0 0 8px ${color}">${value}</div>
    </div>
  `;
}

/* ============================== SIMPLE RESTART SCREEN ============================== */
/* Plain full-screen restart prompt. No ad logic, no AdMob, no async calls —
   just a button that reloads the page. Kept intentionally minimal. */
function renderRestartScreen(){
  root.innerHTML = `
    <div class="w-full min-h-screen flex flex-col items-center justify-center px-4 bg-[var(--void)]">
      <div class="hud-panel clip-corner w-full max-w-[320px] p-5 text-center">
        <h1 class="font-display font-black text-lg text-[var(--green)] tracking-tight mb-2" style="text-shadow:0 0 16px rgba(0,255,159,0.5)">
          RUN ENDED
        </h1>
        <p class="text-[11px] text-[var(--text-dim)] tracking-widest mb-5">// PRESS RESTART TO BEGIN AGAIN</p>
        <button id="btn-simple-restart" class="btn-primary clip-corner w-full py-3 font-display font-bold tracking-widest text-sm pulse-glow">
          &#9656; RESTART
        </button>
      </div>
    </div>
  `;
  document.getElementById('btn-simple-restart').addEventListener('click', ()=>{
    location.reload();
  });
}

/* ============================== AD LAUNCHER (now ad-free) ============================== */
/* AdMob was removed entirely — no plugin calls, no async ad lifecycle,
   nothing that can throw or crash. This just hands off to the plain restart screen. */
function launchAd(){
  renderRestartScreen();
}

/* ============================== BOOT ============================== */
render();
</script>
